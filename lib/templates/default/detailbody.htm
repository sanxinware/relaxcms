		             <!--# if ($v['required'] == 'true') { #-->

                    <span>                            
                        <i class="fa  fa-question-circle  tooltips"

                   <!--# } #-->

		        <div class="col-md-10 $v[clickedit]" data-fieldname="$v[name]" data-modname="$modname" data-baseurl="$_base" data-dlg='$_dlg'>

<script language="javascript">
     
    
    
jQuery(document).ready(function() {

    $('#btnClose').on("click", function(e){
        var index = parent.layer.getFrameIndex(window.name); //先得到当前iframe层的索引
        parent.layer.close(index); //再执行关闭  
    });  

    //dlg
    if ($dlg) {
        parent.$(".layui-layer-title")[0].innerText = '$sys_position';//'$mi18n[modelname]$str_task';    
    }
    
    
    var doSubmit=function(form) {
        if (typeof CKEDITOR != "undefined") { //CKEDITOR提交空值 ？？
            for ( instance in CKEDITOR.instances )
                CKEDITOR.instances[instance].updateElement(); 
        }

       var  formData = $(form).serializeArray();
       
       $.post(form.action, formData, function(res) {
            rui.showStatus(res);
        }).fail(function(res){
              rui.showStatus(res);  
        });
    }

	$('#$table_id').validate({
                errorElement: 'span', //default input error message container
                errorClass: 'help-block', // default input error message class
                focusInvalid: false, // do not focus the last invalid input
                rules: {
                <!--# foreach($fields as $key=>$v) { if (!$v['edit']) continue; #-->
                    'params[$key]': {
                        required: $v[required]
                    },
                <!--# } #-->
                },

                messages: {
                <!--# foreach($fields as $key=>$v) { if (!$v['edit']) continue; #-->
                    'params[$key]': {
                        required: "$key is required."
                    },
                <!--# } #-->
                },

                invalidHandler: function (event, validator) { //display error alert on form submit   
                    $('.alert-danger', $('.login-form')).show();
                },

                highlight: function (element) { // hightlight error inputs
                    $(element)
                        .closest('.form-group').addClass('has-error'); // set error class to the control group
                },

                success: function (label) {
                    label.closest('.form-group').removeClass('has-error');
                    label.remove();
                },

                errorPlacement: function (error, element) {
                    error.insertAfter(element);
                },

                submitHandler: function (form) {
                    doSubmit(form);
                }
            });    
            

            var doTmiLinkButton = function(el, url)
            {
                var id = "$id";
                
                url += '?id='+id;
                rui.redirect(url);
                return true;
            }

            

            var doTmiLinkSubmit = function(el, url)
            {
                var msg = el.attr('msg');
                var name = el.attr('data-name');
                var id = el.attr('data-id');

                if (_.isString(msg) && msg != '') {
                    bootbox.confirm(msg, function(result) {
                        if (result) {
                           $.post(url, {id:id}, function(res) {
                                if (res.status == 0) {
                                    rui.showStatus(res);
                                   //console.log(res.data);
                                   if (!_.isUndefined(res.data.refresh)) {
                                       rui.refresh(1); 
                                   }
                                   if (!_.isUndefined(res.data.redirect)) {
                                       rui.redirect(res.data.redirect); 
                                   }
                                    
                                   //rui.refresh(1);         
                                    //parent refresh
                                   if (_.isFunction(parent.reload)) {
                                        parent.reload();
                                    } 
                                    if (name == 'del') {
                                        $('.tmilink').hide(); 
                                    } else {
                                        rui.refresh(1);
                                    }
                                } else {
                                     rui.showStatus(res);
                                }
                            })
                            .fail(function(res) { 
                                  rui.showStatus(res);
                            });
                        }
                    });
                } else {
                    $.post(url, {id:id}, function(res) {
                        if (res.status >= 0) {
                          rui.showStatus(res);
                           rui.refresh(1);
                        } else {
                            rui.showStatus(res);
                        }
                    })
                    .fail(function(res) { 
                         rui.showStatus(res);
                    });                    
                }
                
                return true;
            }
            
            var showTmbox = function(el, url)
            {
                var title = el.attr("title");
                if (_.isUndefined(title))
                    title = "详细";

                if (url.indexOf('?') < 0) // eg : '/files/file/download'
                     url += '?';
                else if (url.charAt(url.length-1) !== '&') // eg : '/files/file/download?file=a.jpg'
                    url += '&';

                url +='dlg=1&';


                
                
                top.layer.open({
                    type: 2, 
                    title: title, 
                        shadeClose: false,
                        maxmin:true,
                        shade: 0.2,
                        shift:10,
                        area: ['70%', '65%'],
                        content: url
                });
           }
           

            $('.tmilink').on('click', function(e) {
                var el = $(this);
                e.preventDefault(); 
                var url = el.attr('href');
                var action = el.attr('action');
                //console.log(action);
                if (action == 'alink') {
                    rui.redirect(url);
                    return true;
                }  
                
                
                if (action == 'linkbutton') {
                    res = doTmiLinkButton(el, url);
                    return true;
                } else if (action == 'submit' || action == 'button') {
                    res = doTmiLinkSubmit(el, url);
                }  else if (action == 'tmbox') {
                    res = showTmbox(el, url);
                    return true;
                } else {
                    rui.redirect(url);
                    return true;
                }

                return true;
            });  

            //clickedit
            $('.clickedit2 .clickeditbbuttonwrapper2').on('click', function(e){
                var elPanel = $(this).closest('.clickedit');
                var fieldname = elPanel.data('id');

                var elStaticSpan = elPanel.find('.form-control-static');
                var elInputSpan = elPanel.find('.form-control-input');
                var elClickeditButtonSpan = $(this);
                elClickeditButtonSpan.addClass('hidden');

                var oldval = elStaticSpan.html().trim();
                elStaticSpan.hide();

                elInputSpan.removeClass('hidden');
                elInputSpan.show();

                var elInput = $('#param_'+fieldname, elInputSpan);
                elInput.focus();


                var resetStatic = function (newval) {
                    elStaticSpan.show();
                    elInputSpan.hide();
                    elClickeditButtonSpan.removeClass('hidden');
                    elInput.off();
                }

                elInput.on('blur', function(e){
                    resetStatic();
                });

                elInput.on('change', function(e){
                    var newval = $(this).val();

                    resetStatic();

                    var id = "$id";
                    var url = '$_base/clickedit?id='+id;
                    $.post(url, {id:id,modname:'$modname', field:fieldname,value:newval}, function(res) {
                        if (res.status >= 0) {
                           //rui.showSuccess('操作成功.'); 
                           if ( fieldname == 'id') {
                                rui.redirect('$_base/detail?id='+newval);
                            } else {
                                rui.refresh();
                            }
                           if (_.isFunction(parent.reload))
                                parent.reload();
                        } else {
                             rui.showStatus(res);
                        }
                    })
                    .fail(function(res) { 
                          rui.showStatus(res);
                    });
                });
            });
});

	$.fn.select2.defaults.set("theme", "bootstrap");
    var placeholder = "请选择";
    $(".select2me, .select2-multiple").select2({
        placeholder: placeholder,
        width: null,
    });
});
    
</script>
