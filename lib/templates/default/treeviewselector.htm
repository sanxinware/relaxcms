<script type="text/javascript">
      
jQuery(document).ready(function() { 
    var table = $('#$table_id');
    var tableContainer = $("#table_wrapper_$table_id");

    //sort
    var allsortable = $('.sortable', table);
    allsortable.on('click', function (e) {        
        e.preventDefault();      
        
        var th = $(this).closest('th');
        var sortName = th.attr('data-id');
        var sortOrder = 'asc';
        if ($(this).hasClass('asc')) {
            sortOrder = 'desc';
            allsortable.removeClass('asc');
            $(this).addClass('desc')
        } else {
            sortOrder = 'asc';
            allsortable.removeClass('desc');
            $(this).addClass('asc')
        }

        rui.cookie('sortName',sortName);
        rui.cookie('sortOrder',sortOrder);
        
        rui.reload();
    });
    
          
    /**
     * 获得选中的数据，为一个对象数组
     */
    function getSelections() {
        var nr = 0;
        var id = 0;
        var ids = [];   
        
        $('input[type="checkbox"]').each(function() {
            if ($(this).is(':checked')) {
                id = $(this).val();
                ids.push(id);
                nr ++;
            }
        });
        
        return ids;
    }

    $('.checkbox', table).on('click', function(e) {
        var ids = getSelections();
        if (ids.length == 0)
            return false;

        var url = '$mbaseurl';
        var formData={ids:ids,"sbt":"$sbt"};
        //
        $.post(url, formData, function(res) {
            closeWaiting();
            if (res.status == 0) {                        
               //rui.showTSuccess('操作成功.');
               window.row = res.data;   
            } else {
                rui.showTError('操作失败:'+res.status);
            }
        })
        .fail(function() { 
            closeWaiting();
            rui.showTError("系统错误");
        });        
             
    });
            

});
</script>
